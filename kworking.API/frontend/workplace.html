<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рабочее место - KWorking</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .workplace-hero {
            height: 500px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
        }
        .workplace-hero::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(transparent, var(--bg));
        }
        .workplace-info {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 3rem;
        }
        .details, .booking-card {
            background: #242424;
            padding: 2rem;
            border-radius: 12px;
        }
        .booking-card { position: sticky; top: 100px; }
    </style>
</head>
<body>
<!-- Header вставляется автоматически -->

<div id="workplace-hero" class="workplace-hero"></div>

<div class="workplace-info section">
    <div>
        <h1 id="place-name" style="font-size: 2.8rem; margin-bottom: 1rem;"></h1>
        <p id="place-description" style="font-size: 1.2rem; opacity: 0.9; margin-bottom: 2rem;"></p>

        <div class="details">
            <h2>Характеристики</h2>
            <ul id="features" style="list-style: none; margin: 1.5rem 0; line-height: 2;"></ul>
        </div>
    </div>

    <div class="booking-card">
        <h2>Забронировать</h2>
        <div style="margin: 1.5rem 0;">
            <strong>Цена:</strong> <span id="price" style="font-size: 2rem; color: var(--accent);"></span>
        </div>

        <label>Дата:</label>
        <input type="date" id="booking-date" style="width: 100%; padding: 12px; background: #333; border: none; border-radius: 8px; color: white; margin: 8px 0;">

        <label>Начало:</label>
        <input type="time" id="start-time" value="09:00" style="width: 100%; padding: 12px; background: #333; border: none; border-radius: 8px; color: white; margin: 8px 0;">

        <label>Окончание:</label>
        <input type="time" id="end-time" value="18:00" style="width: 100%; padding: 12px; background: #333; border: none; border-radius: 8px; color: white; margin: 8px 0;">

        <button onclick="createBooking()" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 16px;">
            Забронировать
        </button>
    </div>
</div>

<script src="js/api.js"></script>
<script src="components/header.js"></script>
<script>
    let currentPlace = null;

    async function loadWorkplace() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) return window.location.href = "catalog.html";

        try {
            const places = await api.getWorkPlaces();
            currentPlace = places.find(p => p.id == id);
            if (!currentPlace) return alert("Место не найдено");

            document.getElementById('place-name').textContent = currentPlace.name;
            document.getElementById('place-description').textContent = currentPlace.description || "";
            document.getElementById('price').innerHTML = `${currentPlace.pricePerHour || 0} <small>₽/час</small>`;

            const hero = document.getElementById('workplace-hero');
            hero.style.backgroundImage = `url('${currentPlace.imageUrl || `https://via.placeholder.com/1200x500/424123/E6DED3?text=${encodeURIComponent(currentPlace.name)}`}')`;

        } catch (e) {
            console.error(e);
        }
    }

    async function createBooking() {
        if (!currentPlace) return;
        // ... (можно оставить как было)
        alert("Бронирование создано (демо)");
    }

    document.addEventListener('DOMContentLoaded', loadWorkplace);
</script>
</body>
</html>
