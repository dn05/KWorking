<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Точка роста — Вход</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .login-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px;
            box-shadow: var(--shadow-md);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-icon {
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.4px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .login-sub {
            font-size: 13px;
            color: var(--text3);
        }

        .login-btn {
            width: 100%;
            justify-content: center;
            padding: 11px;
            font-size: 14px;
            margin-top: 4px;
        }

        .login-error {
            background: var(--danger-s);
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 16px;
            display: none;
        }

        .login-error.show {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text3);
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-card">

        <div class="login-header">
            <div class="login-icon">🏢</div>
            <div class="login-title">Точка роста</div>
            <div class="login-sub">CRM-система коворкинга</div>
        </div>

        <div class="login-error" id="loginError">
            Неверный логин или пароль
        </div>

        <div class="form-group">
            <label class="form-label">Логин</label>
            <input
                    type="text"
                    id="loginInput"
                    class="form-control"
                    placeholder="Введите логин"
                    autocomplete="username"
            >
        </div>

        <div class="form-group">
            <label class="form-label">Пароль</label>
            <input
                    type="password"
                    id="passwordInput"
                    class="form-control"
                    placeholder="Введите пароль"
                    autocomplete="current-password"
            >
        </div>

        <button class="btn btn-primary login-btn" id="loginBtn" onclick="doLogin()">
            Войти
        </button>

    </div>

    <div class="login-footer">
        Точка роста © 2026
    </div>
</div>

<div class="toast-container" id="toasts"></div>

<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script>
    // Если уже залогинен — сразу на дашборд
    if (getSession()) {
        window.location.href = 'dashboard.html';
    }

    // Войти по Enter
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
        const login    = val('loginInput');
        const password = val('passwordInput');

        if (!validateRequired('loginInput', 'passwordInput')) return;

        const btn = document.getElementById('loginBtn');
        btn.textContent = 'Вход...';
        btn.disabled = true;
        document.getElementById('loginError').classList.remove('show');

        try {
            const user = await Auth.login(login, password);
            saveSession(user);
            window.location.href = 'dashboard.html';
        } catch {
            document.getElementById('loginError').classList.add('show');
            btn.textContent = 'Войти';
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
