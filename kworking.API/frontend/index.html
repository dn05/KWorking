<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KWorking - Коворкинг</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- Header вставляется автоматически через JS -->

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Работай в лучшем месте</h1>
        <p>Современный коворкинг с удобными рабочими местами, высокоскоростным интернетом и комфортной атмосферой</p>
        <button class="btn btn-primary" onclick="window.location.href='catalog.html'">Выбрать место</button>
    </div>
</section>

<!-- Популярные места -->
<section class="section" id="popular">
    <h2>Популярные рабочие места</h2>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem;" id="popular-cards">
        <!-- JS заполнит -->
    </div>
</section>

<script src="js/api.js"></script>
<script src="components/header.js"></script>
<script src="js/main.js"></script>
</body>
</html>
