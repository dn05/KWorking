<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - KWorking</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 3rem;
        }
        .profile-card {
            background: #242424;
            border-radius: 16px;
            padding: 2.5rem;
            text-align: center;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--accent);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: #111;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #333;
            border: none;
            border-radius: 8px;
            color: white;
        }
    </style>
</head>
<body>
<!-- Header вставляется автоматически -->

<section class="section">
    <h2 style="text-align: center; margin-bottom: 3rem;">Личный кабинет</h2>

    <div class="profile-container">
        <!-- Левая колонка -->
        <div class="profile-card">
            <div class="avatar" id="avatar">👤</div>
            <h2 id="user-name">Загрузка...</h2>
            <p id="user-email" style="opacity: 0.8;"></p>

            <button onclick="logout()" style="margin-top: 2rem; background: transparent; border: 1px solid #f87171; color: #f87171; padding: 10px 24px; border-radius: 6px;">
                Выйти
            </button>
        </div>

        <!-- Правая колонка -->
        <div class="profile-card">
            <h3>Личные данные</h3>
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="edit-name" placeholder="Ваше имя">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="edit-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" id="edit-phone" placeholder="+7 (___) ___-__-__">
            </div>

            <button onclick="saveProfile()" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">
                Сохранить изменения
            </button>
        </div>
    </div>
</section>

<script src="js/api.js"></script>
<script src="components/header.js"></script>
<script>
    let currentUser = null;

    // Защита страницы — если не авторизован, кидаем на логин
    function checkAuth() {
        if (!api.isAuthenticated()) {
            alert("Для просмотра профиля нужно войти в аккаунт");
            window.location.href = "auth/login.html";
            return false;
        }
        return true;
    }

    async function loadProfile() {
        if (!checkAuth()) return;

        try {
            currentUser = JSON.parse(localStorage.getItem('user')) || {
                name: "Пользователь",
                email: "user@example.com"
            };

            document.getElementById('user-name').textContent = currentUser.name;
            document.getElementById('user-email').textContent = currentUser.email;
            document.getElementById('edit-name').value = currentUser.name || '';
            document.getElementById('edit-email').value = currentUser.email || '';
            document.getElementById('edit-phone').value = currentUser.phone || '';

        } catch (error) {
            console.error(error);
        }
    }

    function saveProfile() {
        const updated = {
            name: document.getElementById('edit-name').value,
            email: document.getElementById('edit-email').value,
            phone: document.getElementById('edit-phone').value
        };

        localStorage.setItem('user', JSON.stringify(updated));
        currentUser = updated;
        alert("✅ Данные успешно сохранены!");
        loadProfile();
    }

    function logout() {
        if (confirm("Выйти из аккаунта?")) {
            api.logout();
        }
    }

    // Запуск
    document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
