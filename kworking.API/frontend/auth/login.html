<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - KWorking</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
            url('https://via.placeholder.com/1920x1080/424123/E6DED3?text=KWorking') center/cover;
        }
        .auth-box {
            background: #242424;
            padding: 3rem 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .auth-box h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--light);
        }
        .form-group {
            margin-bottom: 1.4rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--light);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #333;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.05rem;
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-box">
        <h1>Вход в аккаунт</h1>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button onclick="login()" class="btn btn-primary" style="width: 100%; padding: 16px; font-size: 1.1rem;">
            Войти
        </button>

        <div class="auth-footer">
            <p>Нет аккаунта? <a href="register.html" style="color: var(--accent);">Зарегистрироваться</a></p>
        </div>
    </div>
</div>

<script src="../js/api.js"></script>
<script>
    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            alert("Заполните все поля");
            return;
        }

        try {
            const data = await api.post('/auth/login', { email, password });

            // Сохраняем токен и пользователя
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user || data));

            alert("✅ Успешный вход!");
            window.location.href = '../index.html';
        } catch (error) {
            alert("Ошибка входа: неверный email или пароль");
            console.error(error);
        }
    }

    // Enter для входа
    document.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
